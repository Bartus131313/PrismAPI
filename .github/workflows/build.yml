name: Build and Publish PrismAPI
on:
  push:
    branches: [ "main" ]
    paths-ignore:
      - '**.md'      # Ignore all Markdown files
      - 'images/**'  # Ignore everything in the images folder
      - 'LICENSE'    # Ignore the license file
  pull_request:
    branches: [ "main" ]
    paths-ignore:
      - '**.md'
      - 'images/**'

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write # Critical for GITHUB_TOKEN to work
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: 'gradle'

      - name: Make Gradle Wrapper Executable
        run: chmod +x gradlew

      - name: Build with Gradle
        run: ./gradlew build

      - name: Publish to GitHub Packages
        run: ./gradlew publish
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}