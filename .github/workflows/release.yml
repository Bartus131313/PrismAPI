name: Publish Prism API
on:
  push:
    tags:
      - 'v*' # Triggers on v1.0.0, v1.1.0, etc.

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write # Required to create the release and upload assets
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: 'gradle'

      - name: Make Gradle Wrapper Executable
        run: chmod +x gradlew

      - name: Build Project
        run: ./gradlew build

      - name: Extract Version
        id: get_version
        run: echo "VERSION=${GITHUB_REF_NAME#v}" >> $GITHUB_OUTPUT

      - name: Verify Version Consistency
        run: |
          PROPS_VERSION=$(grep 'mod_version' gradle.properties | cut -d'=' -f2)
          TAG_VERSION=${{ steps.get_version.outputs.VERSION }}
          if [ "$PROPS_VERSION" != "$TAG_VERSION" ]; then
            echo "Error: gradle.properties version ($PROPS_VERSION) does not match tag ($TAG_VERSION)"
            exit 1
          fi

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          # This specifically targets your two loader jars
          files: |
            fabric/build/libs/prism-api-fabric-${{ steps.get_version.outputs.VERSION }}.jar
            neoforge/build/libs/prism-api-neoforge-${{ steps.get_version.outputs.VERSION }}.jar
          name: Prism API v${{ steps.get_version.outputs.VERSION }}
          tag_name: ${{ github.ref_name }}
          draft: false
          prerelease: false
          generate_release_notes: true # Automatically pulls your commit messages into the release body
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}